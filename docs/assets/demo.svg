<svg xmlns="http://www.w3.org/2000/svg" width="860" height="470" viewBox="0 0 860 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <rect width="860" height="470" rx="10" fill="#0d1117"/>
  <rect width="860" height="34" rx="10" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="430" y="22" fill="#8b949e" text-anchor="middle" font-size="12">kmcp — MCP round trip on 127.0.0.1 (real output)</text>

  <text x="24" y="64" fill="#7ee787">$ ./gradlew runEchoServer</text>
  <text x="24" y="88" fill="#c9d1d9">kmcp echo server listening on http://127.0.0.1:8931/mcp</text>
  <text x="24" y="112" fill="#c9d1d9">discovery document at http://127.0.0.1:8931/.well-known/mcp</text>

  <text x="24" y="152" fill="#7ee787">$ curl -s http://127.0.0.1:8931/mcp -H 'content-type: application/json' \</text>
  <text x="24" y="176" fill="#7ee787">    -d '{"jsonrpc":"2.0","id":1,"method":"tools/call",</text>
  <text x="24" y="200" fill="#7ee787">         "params":{"name":"echo","arguments":{"text":"hello kmcp"}}}'</text>
  <text x="24" y="230" fill="#c9d1d9">{"jsonrpc":"2.0","id":1,"result":{"content":[</text>
  <text x="24" y="254" fill="#c9d1d9">  {"type":"text","text":"</text>
  <text x="222" y="254" fill="#79c0ff">echo: hello kmcp</text>
  <text x="356" y="254" fill="#c9d1d9">"}]}}</text>

  <text x="24" y="294" fill="#7ee787">$ curl -s http://127.0.0.1:8931/.well-known/mcp</text>
  <text x="24" y="318" fill="#c9d1d9">{"version":"1","servers":[{"name":"kmcp-echo","endpoint":"/mcp",</text>
  <text x="24" y="342" fill="#c9d1d9">  "transport":"streamable-http","description":"kmcp echo sample",</text>
  <text x="24" y="366" fill="#c9d1d9">  "protocolVersions":["2025-06-18","2025-03-26"]}]}</text>

  <text x="24" y="406" fill="#7ee787">$ ./gradlew jvmTest</text>
  <text x="24" y="430" fill="#c9d1d9">71 tests completed — BUILD SUCCESSFUL</text>
  <text x="24" y="454" fill="#8b949e">common core: JSON-RPC 2.0 · handshake · tools/resources/prompts · schema validation</text>
</svg>
